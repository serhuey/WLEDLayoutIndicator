name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # The project needs Xcode 26+ (Swift 6.x features), which ships with the
    # macOS 26 runner image.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select newest Xcode 26
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)
          echo "Using $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Run unit tests
        run: |
          xcodebuild test \
            -scheme WLEDLayoutIndicator \
            -destination 'platform=macOS' \
            -only-testing:WLEDLayoutIndicatorTests \
            CODE_SIGN_STYLE=Automatic
